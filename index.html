<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMAI Agent × Asad Lee | Metaverse WL Checker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-3d: #fbbf24; /* Sun Yellow */
      --secondary-3d: #d97706; /* Orange Glow */
      --bg-deep: #020617;
      --glass-light: rgba(255, 255, 255, 0.05);
      --border-3d: rgba(251, 191, 36, 0.15);
    }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background-color: var(--bg-deep);
      color: white;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      perspective: 1500px; /* Essential for 3D tilt */
      padding: 20px;
      box-sizing: border-box;
    }

    /* Animated 3D Gradient Background RAYS */
    body::before {
      content: '';
      position: fixed;
      top: -100px;
      left: -100px;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at top right, rgba(251, 191, 36, 0.08) 0%, transparent 60%),
                  radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.06) 0%, transparent 60%);
      z-index: -2;
      animation: background3DMove 15s linear infinite;
    }

    @keyframes background3DMove {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    /* Floating Translucent Shapes */
    .shape {
      position: absolute;
      background: rgba(251, 191, 36, 0.03);
      border: 1px solid rgba(251, 191, 36, 0.08);
      border-radius: 10px;
      backdrop-filter: blur(5px);
      animation: float 10s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-50px) rotate(5deg); }
    }

    /* 3D TILT Card */
    .meta-card {
      background: var(--glass-light);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border-3d);
      padding: 50px 30px;
      border-radius: 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      position: relative;
      transition: transform 0.4s ease, border-color 0.4s ease;
      transform-style: preserve-3d; /* Keep card children in 3D */
      margin-top: 50px; /* Space for attribution */
    }

    .meta-card:hover {
      border-color: rgba(251, 191, 36, 0.5);
      transform: rotateX(2deg) rotateY(-2deg) translateY(-5px); /* Responsive tilt on desktop */
    }

    /* Agent Avatar with GIGANTIC GLOW */
    .meta-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 5px solid var(--primary-3d);
      margin: -100px auto 20px;
      display: block;
      box-shadow: 0 0 50px rgba(251, 191, 36, 0.6), 0 0 100px rgba(217, 119, 6, 0.3);
      background: #000;
      transform: translateZ(30px); /* Puts avatar out forward */
    }

    h2 {
      margin: 10px 0 5px;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 40%, var(--primary-3d));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .info-strip {
      background: rgba(251, 191, 36, 0.05);
      border: 1px dashed var(--border-3d);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      color: var(--primary-3d);
      margin-bottom: 25px;
      transform: translateZ(10px);
    }

    /* 3D Input (with slight depth) */
    .input-3d-wrap {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 12px;
      color: white;
      text-align: center;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    /* Real PUSH 3D Button */
    .meta-button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary-3d) 0%, var(--secondary-3d) 100%);
      color: #000;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 8px 0 rgba(217, 119, 6, 1);
      transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .meta-button:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 rgba(217, 119, 6, 1);
    }

    #result {
      margin-top: 25px;
      min-height: 70px;
      font-weight: 600;
    }

    /* 3D Floating Footer Link Ribbon */
    .meta-footer {
      display: flex;
      gap: 15px;
      margin-top: 40px;
      background: rgba(255,255,255,0.01);
      padding: 12px 24px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .meta-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 13px;
      transition: 0.3s;
    }

    .meta-link:hover {
      color: #fff;
      transform: scale(1.05);
    }

    .meta-link img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 1px solid var(--border-3d);
    }

    /* Floating Dev Badge */
    .attribution-fixed {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--glass-light);
      border: 1px solid var(--border-3d);
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
    }
    .attribution-fixed img { width: 20px; height: 20px; border-radius: 50%; }

    /* Mobile Responsive Optimizations */
    @media (max-width: 480px) {
      .meta-card { padding: 40px 20px; margin-top: 40px; }
      h2 { font-size: 24px; }
      .meta-footer { flex-direction: column; border-radius: 15px; padding: 15px; width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>

  <div class="attribution-fixed">
    <img src="https://pbs.twimg.com/profile_images/2033042839899443200/sZK1sMjB_400x400.jpg" alt="Asad Lee">
    <span>Developed by <b>Asad Lee</b></span>
  </div>

  <div class="shape" style="width: 80px; height: 80px; top: 10%; left: 15%; animation-delay: 1s;"></div>
  <div class="shape" style="width: 50px; height: 50px; top: 70%; right: 10%; animation-delay: 3s; border-radius: 50%;"></div>
  <div class="shape" style="width: 100px; height: 100px; bottom: 10%; left: 5%; animation-delay: 5s;"></div>

  <div class="meta-card">
    <img src="https://pbs.twimg.com/profile_images/2031500029924433921/ZA1AP0Er_400x400.jpg" class="meta-avatar" alt="CMAI Agent">
    <h2>cmai🤖.eth</h2>
    <div class="info-strip">Verified DB from shared sheet by @cmai_agent</div>

    <div class="input-3d-wrap">
      <input id="meta-wallet" placeholder="Paste your ETH address (0x...)">
    </div>
    
    <button class="meta-button" onclick="checkStatus3D()">Confirm Whitelist</button>

    <div id="result"></div>
  </div>

  <div class="meta-footer">
    <a href="https://x.com/jgonzalezferrer" target="_blank" class="meta-link">
        <img src="https://pbs.twimg.com/profile_images/2034625641165774848/At0bXLEQ_400x400.jpg" alt="Owner">
        <span>Owner<b>Javi.eth</b></span>
    </a>
    <a href="https://x.com/asadleo416" target="_blank" class="meta-link">
        <img src="https://pbs.twimg.com/profile_images/2033042839899443200/sZK1sMjB_400x400.jpg" alt="Dev">
        <span>Dev<b>Asad Lee</b></span>
    </a>
  </div>

<script>
  const SHEET_URL_3D = "https://docs.google.com/spreadsheets/d/15rLO4jkYmKcIujEx7Q9xuJTr-lGXHv7rtXgZgd073Y0/export?format=csv";

  async function checkStatus3D() {
    const input_el = document.getElementById("meta-wallet");
    const wallet_addr = input_el.value.trim().toLowerCase();
    const resultDiv_el = document.getElementById("result");

    if (!wallet_addr) {
      resultDiv_el.innerHTML = "<span style='color: #ef4444'>Input required!</span>";
      // Give input field a shake to alert
      input_el.style.borderColor = "#ef4444";
      setTimeout(()=> input_el.style.borderColor = "var(--border-3d)", 1000);
      return;
    }

    resultDiv_el.innerHTML = "<div style='color: #94a3b8; font-size: 13px; animation: glow 1.5s infinite;'>Accessing database...</div>";

    try {
      const res = await fetch(SHEET_URL_3D);
      const csvData_text = await res.text();
      Papa.parse(csvData_text, {
        complete: function(data_results) {
          const table_rows = data_results.data;
          let wl_entry = table_rows.find(row => (row[0]||"").toLowerCase().trim() === wallet_addr);
          
          if (wl_entry) {
            resultDiv_el.innerHTML = `<div style="color: #4ade80; background: rgba(74, 222, 128, 0.1); padding: 12px; border-radius: 12px; border: 1px solid #4ade80; transform: translateZ(10px);">✅ Spots Confirmed: ${wl_entry[1] || "Member"} Role</div>`;
          } else {
            resultDiv_el.innerHTML = `<div style="color: #ef4444; background: rgba(239, 68, 68, 0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2);">🚫 Wallet not found.</div>`;
          }
        }
      });
    } catch (e) {
      resultDiv_el.innerHTML = "System Error. Check Network.";
    }
  }

  // Define some glow animation for loading
  const styleSheet = document.createElement("style");
  styleSheet.type = "text/css";
  styleSheet.innerText = "@keyframes glow { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }";
  document.head.appendChild(styleSheet);
</script>

</body>
</html>
